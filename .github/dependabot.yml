# Automated dependency updates — Scorecard's Dependency-Update-Tool
# signal; also keeps the SHA-pinned actions current. Grouped so routine
# bumps arrive as a few PRs, not one per dependency.
version: 2
updates:
    - package-ecosystem: cargo
      directory: "/"
      schedule:
          interval: weekly
      open-pull-requests-limit: 5
      groups:
          cargo-minor:
              patterns: ["*"]
              update-types: ["minor", "patch"]

    - package-ecosystem: github-actions
      directory: "/"
      schedule:
          interval: weekly
      groups:
          ci-actions:
              patterns: ["*"]

    - package-ecosystem: docker
      directory: "/"
      schedule:
          interval: weekly
      groups:
          docker:
              patterns: ["*"]
