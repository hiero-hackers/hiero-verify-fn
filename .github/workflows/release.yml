name: Release

# Publishes the crate to crates.io. The token lives ONLY as the
# org-owned publish secret — it is never on a developer's machine, so
# publishing happens here in CI, auditably.
#
# ⚠️ SECRET NAME: this references `secrets.TOKEN_VERIFY_FN`. Make sure the
# repository secret you were given is named exactly that (or edit the two
# references below to match).
#
# To release: bump the version in Cargo.toml, merge to main, then push a
# matching tag (`git tag -s v0.1.0 && git push origin v0.1.0`).
on:
    push:
        tags: ["v*.*.*"]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    publish:
        name: Publish to crates.io
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Install protoc
              run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

            - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

            # A tag must match Cargo.toml's version — otherwise a mistaken
            # tag would publish the wrong version. (Skipped on manual runs.)
            - name: Tag matches crate version
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  crate=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
                  tag="${GITHUB_REF_NAME#v}"
                  if [ "$crate" != "$tag" ]; then
                      echo "::error::tag v$tag does not match Cargo.toml version $crate"
                      exit 1
                  fi
                  echo "publishing version $crate"

            # `--locked` publishes exactly the reviewed Cargo.lock. Re-running
            # after a version already exists fails cleanly (no double-publish).
            - name: Publish
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.TOKEN_VERIFY_FN }}
              run: cargo publish --locked
