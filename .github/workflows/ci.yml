name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Format, lint, build, smoke test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Install protoc
              run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

            - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
              with:
                  components: rustfmt, clippy

            - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

            - run: cargo fmt --check
            - run: cargo clippy --all-targets -- -D warnings
            - run: cargo build --release

            # The contract, exercised for real: boot the function, POST the
            # baked genesis block (self-bootstrapping), require valid:true —
            # and require garbage to come back 400, never a crash.
            - name: Smoke test
              run: |
                  PORT=8080 ./target/release/hiero-verify-fn &
                  SRV=$!
                  for i in $(seq 100); do
                      curl -sf http://127.0.0.1:8080/healthz >/dev/null 2>&1 && break
                      sleep 0.1
                  done
                  body=$(curl -sf -X POST --data-binary @bootstrap/genesis-cn-0.73-tss.blk.gz http://127.0.0.1:8080/verify)
                  echo "$body"
                  echo "$body" | grep -q '"valid":true'
                  code=$(curl -s -o /dev/null -w '%{http_code}' -X POST --data-binary garbage http://127.0.0.1:8080/verify)
                  test "$code" = "400"
                  kill $SRV

    deny:
        name: Supply chain (cargo-deny)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
              with:
                  command: check
