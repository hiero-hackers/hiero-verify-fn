name: Scorecard

# OpenSSF Scorecard supply-chain analysis; publishes results for the
# README badge (requires the repository to be public).
on:
    branch_protection_rule:
    push:
        branches: [main]
    schedule:
        - cron: "0 7 * * 3" # weekly, Wednesdays 07:00 UTC

permissions: read-all

jobs:
    analysis:
        name: Scorecard analysis
        runs-on: ubuntu-latest
        permissions:
            security-events: write
            id-token: write
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
              with:
                  results_file: results.sarif
                  results_format: sarif
                  publish_results: true

            - uses: github/codeql-action/upload-sarif@e5d2f324924c57b6cabef9bdd7a1c85d62a89be2 # v3.37.0
              with:
                  sarif_file: results.sarif
